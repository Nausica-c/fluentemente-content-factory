seo:

  language: "en"

  content:

    min_words: 1800
    recommended_words: 2500

    tone:
      - practical
      - conversational
      - encouraging

    formatting:
      short_paragraphs: true
      markdown: true

  title:

    min_characters: 45
    max_characters: 65

    formats:
      - "{keyword}: Complete Guide"
      - "How to {keyword}"
      - "{keyword} for Beginners"

  meta_description:

    min_characters: 130
    max_characters: 155

    include_keyword: true
    include_benefit: true

  headings:

    h1_per_article: 1

    h2:
      every_words: 300

    include_secondary_keywords: true

  keywords:

    primary_density:
      min: 0.8
      max: 1.2

    semantic_variations: true

  linking:

    internal_links:
      min: 4
      max: 8

    must_link_to_pillar: true

  faq:

    enabled: true

    min_questions: 3
    max_questions: 6

  readability:

    max_sentence_words: 20

    transition_words: true

  conclusion:

    summary_required: true

    final_cta_required: true

output:

  format: markdown

  required_sections:
    - frontmatter
    - introduction
    - body
    - faq
    - conclusion
    - cta
